name: Bedside
options:
  bundleIdPrefix: com.folioreader
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Bedside:
    type: application
    platform: iOS
    sources:
      - path: BedsideApp.swift
      - path: PrivacyInfo.xcprivacy
      - path: Models
      - path: Store
      - path: Theme
      - path: Components
      - path: Views
      - path: Assets.xcassets
    settings:
      base:
        # Bundle ID intentionally retains com.folioreader.app — chosen during
        # the Folio → Bedside rename. Per BACKLOG/rebrand decision: switching
        # is free pre-launch but unnecessary, and was held to keep TestFlight
        # builds continuous.
        PRODUCT_BUNDLE_IDENTIFIER: com.folioreader.app
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: PhotosUI.framework

  BedsideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BedsideTests
    dependencies:
      - target: Bedside
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.folioreader.app.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Bedside.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Bedside
